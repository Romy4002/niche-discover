name: Daily Market Intelligence Run

on:
  schedule:
    - cron: "0 7 * * *"   # 7 AM UTC daily
  workflow_dispatch:        # allow manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          REDDIT_CLIENT_ID:     ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT:    ${{ secrets.REDDIT_USER_AGENT }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL:  ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Persist master history to repo
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add storage/master/
          git diff --staged --quiet || git commit -m "chore: update master history [skip ci]"
          git push

      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: intel-report-${{ github.run_id }}
          path: storage/reports/
          retention-days: 30
